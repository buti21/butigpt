  <body>
    <style>
      #buti-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 24px;
        background:
          radial-gradient(800px 500px at 80% -10%, rgba(139,92,246,0.18), transparent 60%),
          radial-gradient(700px 400px at -10% 110%, rgba(167,139,250,0.12), transparent 60%),
          #0F0F12;
        color: #f1f1f5;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        transition: opacity 350ms ease-out;
      }
      #buti-splash.hidden { opacity: 0; pointer-events: none; }
      #buti-splash .logo {
        width: 64px; height: 64px; border-radius: 18px;
        background: linear-gradient(135deg, #8b5cf6, #c084fc);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 28px; letter-spacing: -0.5px;
        color: white;
        box-shadow: 0 10px 40px -12px rgba(139,92,246,0.55);
        animation: buti-pulse 1.6s ease-in-out infinite;
      }
      #buti-splash .name {
        font-size: 17px; font-weight: 600; letter-spacing: -0.2px;
      }
      #buti-splash .dots {
        display: flex; gap: 6px; margin-top: 4px;
      }
      #buti-splash .dot {
        width: 6px; height: 6px; border-radius: 999px;
        background: rgba(192,132,252,0.7);
        animation: buti-bounce 1.2s ease-in-out infinite;
      }
      #buti-splash .dot:nth-child(2) { animation-delay: 0.15s; }
      #buti-splash .dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes buti-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 10px 40px -12px rgba(139,92,246,0.55); }
        50% { transform: scale(1.06); box-shadow: 0 14px 50px -10px rgba(139,92,246,0.8); }
      }
      @keyframes buti-bounce {
        0%, 100% { transform: translateY(0); opacity: 0.5; }
        50% { transform: translateY(-5px); opacity: 1; }
      }
    </style>
    <div id="buti-splash" aria-hidden="true">
      <div class="logo">B</div>
      <div class="name">ButiGPT</div>
      <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener("load", function () {
        setTimeout(function () {
          var s = document.getElementById("buti-splash");
          if (!s) return;
          s.classList.add("hidden");
          setTimeout(function () { s && s.remove(); }, 400);
        }, 350);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
